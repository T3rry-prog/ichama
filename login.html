<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #0DBF72;
      --green-d: #09A05E;
      --dark:    #0A0F0D;
      --card:    #111A15;
      --border:  #1E2E24;
      --muted:   #6B7F73;
      --white:   #F4FBF7;
      --error:   #FF5B5B;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--green); }

    .nav-link {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }

    .nav-link:hover { color: var(--white); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #A8BFB2;
      margin-bottom: 7px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }

    .label-row label { margin-bottom: 0; }

    .forgot-link {
      font-size: 12px;
      color: var(--green);
      text-decoration: none;
    }

    .forgot-link:hover { text-decoration: underline; }

    input {
      width: 100%;
      background: #0A0F0D;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: #3d5448; }
    input:focus { border-color: var(--green); }

    /* Password show/hide */
    .pw-wrap {
      position: relative;
    }

    .pw-wrap input {
      padding-right: 48px;
    }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
    }

    .pw-toggle:hover { color: var(--white); }

    .btn-submit {
      width: 100%;
      background: var(--green);
      color: var(--dark);
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 0 24px rgba(13,191,114,0.25);
    }

    .btn-submit:hover { background: var(--green-d); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin: 20px 0;
    }

    .signup-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .signup-link a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }

    .msg {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .msg.error {
      background: rgba(255,91,91,0.1);
      border: 1px solid rgba(255,91,91,0.3);
      color: #FF5B5B;
    }

    .msg.success {
      background: rgba(13,191,114,0.1);
      border: 1px solid rgba(13,191,114,0.3);
      color: var(--green);
    }

    .msg.show { display: block; }

    /* Forgot password panel */
    .reset-panel {
      display: none;
    }

    .reset-panel.show {
      display: block;
    }

    .login-panel.hide {
      display: none;
    }

    .back-link {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover { color: var(--white); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    footer strong { color: #6B9E88; font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">i<span>Chama</span></a>
    <a href="signup.html" class="nav-link">Create account</a>
  </nav>

  <main>
    <div class="card">

      <!-- LOGIN PANEL -->
      <div id="loginPanel">
        <div class="card-header">
          <h1>Welcome back</h1>
          <p>Sign in to your iChama account</p>
        </div>

        <div class="msg error" id="errorMsg"></div>
        <div class="msg success" id="successMsg"></div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link" onclick="showReset(event)">Forgot password?</a>
          </div>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
            <button class="pw-toggle" onclick="togglePassword()" type="button" id="pwToggle">👁</button>
          </div>
        </div>

        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Sign in →</button>

        <div class="divider">or</div>

        <div class="signup-link">
          Don't have an account? <a href="signup.html">Sign up free</a>
        </div>
      </div>

      <!-- FORGOT PASSWORD PANEL -->
      <div id="resetPanel" class="reset-panel">
        <button class="back-link" onclick="showLogin()">← Back to sign in</button>

        <div class="card-header">
          <h1>Reset password</h1>
          <p>We'll send a reset link to your email</p>
        </div>

        <div class="msg error" id="resetErrorMsg"></div>
        <div class="msg success" id="resetSuccessMsg"></div>

        <div class="form-group">
          <label for="resetEmail">Email address</label>
          <input type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email" />
        </div>

        <button class="btn-submit" id="resetBtn" onclick="handleReset()">Send reset link →</button>
      </div>

    </div>
  </main>

  <footer>
    © 2026 iChama · <strong>A product of Bytecast Prime</strong>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TReV1aiW6oT0X4peP7zKQw_1R6gH0XV';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Show/hide password
    function togglePassword() {
      const input = document.getElementById('password');
      const btn   = document.getElementById('pwToggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    // Switch panels
    function showReset(e) {
      e.preventDefault();
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('resetPanel').classList.add('show');
    }

    function showLogin() {
      document.getElementById('loginPanel').style.display = 'block';
      document.getElementById('resetPanel').classList.remove('show');
    }

    // Login
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      if (!email)    return showError('Please enter your email address.');
      if (!password) return showError('Please enter your password.');

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Incorrect email or password. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in →';
        return;
      }

      showSuccess('Signed in! Redirecting...');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }

    // Password reset
    async function handleReset() {
      const email = document.getElementById('resetEmail').value.trim();
      const btn   = document.getElementById('resetBtn');
      const errEl = document.getElementById('resetErrorMsg');
      const sucEl = document.getElementById('resetSuccessMsg');

      if (!email) {
        errEl.textContent = 'Please enter your email address.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://ichamaa.netlify.app/reset.html'
      });

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Send reset link →';
        return;
      }

      sucEl.textContent = 'Reset link sent! Check your email inbox.';
      sucEl.classList.add('show');
      errEl.classList.remove('show');
      btn.textContent = 'Sent ✓';
    }

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('resetPanel').classList.contains('show')) {
          handleReset();
        } else {
          handleLogin();
        }
      }
    });

    // If already logged in, go straight to dashboard
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });
  </script>

</body>
</html>
