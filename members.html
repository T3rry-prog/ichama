<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #30B54A; --green-d: #259A3D; --green-tint: #EAF8ED;
      --ink: #1A1F1C; --ink-soft: #5C6760; --bg: #F7F8F7;
      --card: #FFFFFF; --line: #E5E9E6; --error: #D14343; --gold: #D97706;
    }
    body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 16px; min-height: 100vh; padding-bottom: 40px; }
    nav { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
    .back-btn { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--ink); text-decoration: none; font-size: 16px; }
    nav h1 { font-weight: 600; font-size: 16px; flex: 1; }
    .invite-btn { background: var(--green); color: #fff; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
    main { padding: 20px 20px 48px; max-width: 480px; margin: 0 auto; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 12px; text-align: center; }
    .stat-card .val { font-weight: 800; font-size: 22px; color: var(--ink); line-height: 1; margin-bottom: 4px; }
    .stat-card .val.green { color: var(--green); }
    .stat-card .val.gold  { color: var(--gold); }
    .stat-card .lbl { font-size: 11px; color: var(--ink-soft); }
    .invite-card { background: var(--green-tint); border: 1px solid rgba(48,181,74,0.2); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .invite-left .title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
    .invite-left .code { font-size: 20px; font-weight: 800; color: var(--green-d); letter-spacing: 2px; }
    .invite-left .hint { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
    .copy-btn { background: var(--green); color: #fff; border: none; border-radius: 9px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; }
    .copy-btn:hover { background: var(--green-d); }
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--ink-soft); pointer-events: none; }
    .search-input { width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 10px; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 14px; padding: 11px 14px 11px 38px; outline: none; transition: border-color 0.15s; }
    .search-input::placeholder { color: #A7AFA9; }
    .search-input:focus { border-color: var(--green); }
    .members-list { background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .member-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.1s; }
    .member-row:last-child { border-bottom: none; }
    .member-row:hover { background: var(--bg); }
    .member-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-tint); color: var(--green-d); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
    .admin-crown { position: absolute; top: -4px; right: -4px; font-size: 12px; }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-phone { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .member-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .score-pill { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 100px; }
    .score-high { background: var(--green-tint); color: var(--green-d); }
    .score-mid  { background: #FEF3C7; color: #92400E; }
    .score-low  { background: #FEE2E2; color: var(--error); }
    .paid-dot { width: 8px; height: 8px; border-radius: 50%; }
    .paid-yes { background: var(--green); }
    .paid-no  { background: #FCD34D; }
    .empty-state { text-align: center; padding: 32px; color: var(--ink-soft); font-size: 13.5px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--line); border-radius: 100px; margin: 0 auto 20px; }
    .modal-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--green-tint); color: var(--green-d); font-weight: 800; font-size: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .modal-name { font-weight: 700; font-size: 18px; text-align: center; margin-bottom: 4px; }
    .modal-role { font-size: 13px; color: var(--ink-soft); text-align: center; margin-bottom: 20px; }
    .modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .modal-stat { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
    .modal-stat .v { font-weight: 700; font-size: 18px; color: var(--ink); }
    .modal-stat .l { font-size: 11px; color: var(--ink-soft); margin-top: 3px; }
    .modal-close { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>

  <nav>
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Members</h1>
    <button class="invite-btn" id="shareBtn">+ Invite</button>
  </nav>

  <main>
    <div id="loadingState" style="text-align:center;padding:40px;color:#5C6760;">Loading...</div>
    <div id="mainContent" style="display:none">

      <div class="stats-row">
        <div class="stat-card"><div class="val" id="totalMembers">—</div><div class="lbl">Total</div></div>
        <div class="stat-card"><div class="val green" id="paidCount">—</div><div class="lbl">Paid this month</div></div>
        <div class="stat-card"><div class="val gold" id="pendingCount">—</div><div class="lbl">Pending</div></div>
      </div>

      <div class="invite-card">
        <div class="invite-left">
          <div class="title">Invite code</div>
          <div class="code" id="inviteCode">——</div>
          <div class="hint">Share this code to add new members</div>
        </div>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search members..." />
      </div>

      <div class="members-list" id="membersList"></div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-avatar" id="modalAvatar">—</div>
      <div class="modal-name" id="modalName">—</div>
      <div class="modal-role" id="modalRole">—</div>
      <div class="modal-stats">
        <div class="modal-stat"><div class="v" id="modalScore">—</div><div class="l">Score</div></div>
        <div class="modal-stat"><div class="v" id="modalContribs">—</div><div class="l">Contributions</div></div>
        <div class="modal-stat"><div class="v" id="modalStatus">—</div><div class="l">This month</div></div>
      </div>
      <button class="modal-close" id="modalCloseBtn">Close</button>
    </div>
  </div>

  <script>
    var SUPABASE_URL      = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaWp2eXFrb2lla3d5bHhiamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzAxNDUsImV4cCI6MjA5NzMwNjE0NX0.7C7hnKmpIRMnrNU9VJWO-lWp4tu00wF8atxzCNYfi6E';

    var allMembers  = [];
    var chamaData   = null;
    var currentUser = null;

    function getToken() { return localStorage.getItem('ichama_token'); }
    function getUser()  { try { return JSON.parse(localStorage.getItem('ichama_user')); } catch(e) { return null; } }
    function authHeaders() {
      return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
    }
    function doLogout() {
      localStorage.removeItem('ichama_token'); localStorage.removeItem('ichama_refresh'); localStorage.removeItem('ichama_user');
      window.location.href = 'login.html';
    }
    if (!getToken()) { window.location.href = 'login.html'; }

    function scoreClass(s) {
      if (s >= 75) return 'score-high';
      if (s >= 50) return 'score-mid';
      return 'score-low';
    }

    async function sbGet(path) {
      var res = await fetch(SUPABASE_URL + path, { headers: authHeaders() });
      if (res.status === 401) { doLogout(); return null; }
      return res.ok ? res.json() : null;
    }

    // ── COPY INVITE ──
    document.getElementById('copyBtn').addEventListener('click', function() {
      var code = chamaData && chamaData.invite_code ? chamaData.invite_code : '';
      if (!code) return;
      var btn = this;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(function() {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = code; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
      }
    });

    // ── SHARE INVITE ──
    document.getElementById('shareBtn').addEventListener('click', function() {
      var code = chamaData && chamaData.invite_code ? chamaData.invite_code : '';
      if (!code) { alert('Invite code not loaded yet. Please wait.'); return; }
      var text = 'Join our chama on iChama!\nInvite code: ' + code + '\nhttps://ichamaa.netlify.app';

      function fallback() {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(function() {
              alert('Invite message copied! Paste it anywhere to share.');
            }).catch(function() {
              alert('Invite code: ' + code + '\n\nShare this with your members.');
            });
          } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            try { document.execCommand('copy'); alert('Invite message copied!'); }
            catch(e) { alert('Invite code: ' + code + '\n\nShare this with your members.'); }
            document.body.removeChild(ta);
          }
        } catch(e) {
          alert('Invite code: ' + code + '\n\nShare this with your members.');
        }
      }

      if (navigator.share) {
        navigator.share({ title: 'Join our chama on iChama', text: text })
          .catch(function(err) {
            // User cancelled or share failed — fall back silently
            if (err.name !== 'AbortError') fallback();
          });
      } else {
        fallback();
      }
    });

    // ── SEARCH ──
    document.getElementById('searchInput').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      var filtered = allMembers.filter(function(m) {
        return (m.profiles && m.profiles.full_name ? m.profiles.full_name.toLowerCase() : '').includes(q) ||
               (m.profiles && m.profiles.phone ? m.profiles.phone : '').includes(q);
      });
      renderMembers(filtered);
    });

    // ── MODAL ──
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('show');
    });
    document.getElementById('modalCloseBtn').addEventListener('click', function() {
      document.getElementById('modalOverlay').classList.remove('show');
    });

    // ── RENDER ──
    function renderMembers(list) {
      var el = document.getElementById('membersList');
      if (!list.length) {
        el.innerHTML = '<div class="empty-state">No members found</div>';
        return;
      }
      el.innerHTML = list.map(function(m, i) {
        var name     = m.profiles && m.profiles.full_name ? m.profiles.full_name : 'Unknown';
        var initials = name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
        var score    = m.profiles && m.profiles.accountability_score != null ? m.profiles.accountability_score : 100;
        var paid     = m.paid_this_month;
        var isAdmin  = m.role === 'admin';
        var isMe     = currentUser && m.user_id === currentUser.id;
        return '<div class="member-row" data-index="' + i + '">' +
          '<div class="member-avatar">' + initials + (isAdmin ? '<span class="admin-crown">👑</span>' : '') + '</div>' +
          '<div class="member-info">' +
            '<div class="member-name">' + name + (isMe ? ' (You)' : '') + '</div>' +
            '<div class="member-phone">' + (m.profiles && m.profiles.phone ? m.profiles.phone : '—') + '</div>' +
          '</div>' +
          '<div class="member-right">' +
            '<span class="score-pill ' + scoreClass(score) + '">' + score + '</span>' +
            '<div class="paid-dot ' + (paid ? 'paid-yes' : 'paid-no') + '"></div>' +
          '</div>' +
        '</div>';
      }).join('');

      el.querySelectorAll('.member-row').forEach(function(row) {
        row.addEventListener('click', function() {
          showMember(parseInt(this.getAttribute('data-index')));
        });
      });
    }

    async function showMember(index) {
      var m        = allMembers[index];
      var name     = m.profiles && m.profiles.full_name ? m.profiles.full_name : 'Unknown';
      var initials = name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
      var score    = m.profiles && m.profiles.accountability_score != null ? m.profiles.accountability_score : 100;

      document.getElementById('modalAvatar').textContent   = initials;
      document.getElementById('modalName').textContent     = name;
      document.getElementById('modalRole').textContent     = m.role === 'admin' ? '👑 Admin' : 'Member';
      document.getElementById('modalScore').textContent    = score;
      document.getElementById('modalContribs').textContent = '…';
      document.getElementById('modalStatus').textContent   = m.paid_this_month ? '✅ Paid' : '⏳ Pending';
      document.getElementById('modalOverlay').classList.add('show');

      // Load contribution count
      var contribs = await sbGet('/rest/v1/contributions?chama_id=eq.' + chamaData.id + '&user_id=eq.' + m.user_id + '&status=eq.paid&select=id');
      document.getElementById('modalContribs').textContent = contribs ? contribs.length : 0;
    }

    async function loadPage() {
      try {
        currentUser = getUser();
        if (!currentUser) { doLogout(); return; }

        var memberships = await sbGet('/rest/v1/chama_members?user_id=eq.' + currentUser.id + '&select=*,chamas(*)&limit=1');
        var membership  = Array.isArray(memberships) && memberships.length > 0 ? memberships[0] : null;
        if (!membership || !membership.chamas) { window.location.href = 'dashboard.html'; return; }

        chamaData = membership.chamas;
        document.getElementById('inviteCode').textContent = chamaData.invite_code || '——';

        var members = await sbGet('/rest/v1/chama_members?chama_id=eq.' + chamaData.id + '&select=*,profiles(full_name,phone,accountability_score)&order=role.asc') || [];

        var startOfMonth = new Date();
        startOfMonth.setDate(1); startOfMonth.setHours(0, 0, 0, 0);
        var contribs = await sbGet('/rest/v1/contributions?chama_id=eq.' + chamaData.id + '&status=eq.paid&created_at=gte.' + startOfMonth.toISOString() + '&select=user_id') || [];
        var paidIds  = new Set(contribs.map(function(c) { return c.user_id; }));

        allMembers = members.map(function(m) {
          return Object.assign({}, m, { paid_this_month: paidIds.has(m.user_id) });
        });

        var paidCount = allMembers.filter(function(m) { return m.paid_this_month; }).length;
        document.getElementById('totalMembers').textContent = allMembers.length;
        document.getElementById('paidCount').textContent    = paidCount;
        document.getElementById('pendingCount').textContent = allMembers.length - paidCount;

        renderMembers(allMembers);

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display  = 'block';

      } catch(err) {
        document.getElementById('loadingState').textContent = 'Error loading members.';
      }
    }

    loadPage();
  </script>

</body>
</html>
