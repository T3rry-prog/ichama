<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #30B54A;
      --green-d:    #259A3D;
      --green-tint: #EAF8ED;
      --ink:        #1A1F1C;
      --ink-soft:   #5C6760;
      --bg:         #F7F8F7;
      --card:       #FFFFFF;
      --line:       #E5E9E6;
      --error:      #D14343;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      text-decoration: none;
      font-size: 16px;
    }

    .topbar h1 { font-weight: 600; font-size: 16px; }

    main {
      padding: 20px 20px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* FILTER TABS */
    .tabs {
      display: flex;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 6px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
    }

    .tab.active {
      background: var(--green);
      color: #fff;
      font-weight: 600;
    }

    /* SUMMARY CARD */
    .summary-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 16px;
      display: flex;
      gap: 0;
    }

    .summary-stat {
      flex: 1;
      text-align: center;
    }

    .summary-stat:not(:last-child) {
      border-right: 1px solid var(--line);
    }

    .summary-stat .val {
      font-weight: 800;
      font-size: 18px;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 4px;
    }

    .summary-stat .val.green { color: var(--green); }

    .summary-stat .lbl {
      font-size: 11px;
      color: var(--ink-soft);
    }

    /* ACTIVITY GROUP */
    .date-group { margin-bottom: 16px; }

    .date-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .activity-list {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .activity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--line);
    }

    .activity-row:last-child { border-bottom: none; }

    .activity-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .icon-contrib  { background: var(--green-tint); }
    .icon-withdraw { background: #FEF3C7; }
    .icon-penalty  { background: #FEE2E2; }

    .activity-info { flex: 1; min-width: 0; }

    .activity-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-sub {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    .activity-amount {
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .amount-in  { color: var(--green); }
    .amount-out { color: var(--error); }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
    }

    .empty-icon { font-size: 48px; margin-bottom: 14px; }

    .empty-state h3 {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 6px;
    }

    .empty-state p { font-size: 13.5px; color: var(--ink-soft); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      padding: 5px 14px;
    }

    .nav-icon { font-size: 19px; }
    .nav-label { font-size: 10px; color: var(--ink-soft); }
    .nav-item.active .nav-label { color: var(--green); font-weight: 600; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Activity</h1>
  </div>

  <main>
    <div id="loadingState" style="text-align:center;padding:40px;color:#5C6760;">Loading...</div>
    <div id="mainContent" style="display:none">

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('all', this)">All</button>
        <button class="tab" onclick="switchTab('contributions', this)">Contributions</button>
        <button class="tab" onclick="switchTab('withdrawals', this)">Withdrawals</button>
      </div>

      <!-- SUMMARY -->
      <div class="summary-card">
        <div class="summary-stat">
          <div class="val green" id="sumTotal">—</div>
          <div class="lbl">Total in</div>
        </div>
        <div class="summary-stat">
          <div class="val" id="sumWithdrawals">—</div>
          <div class="lbl">Withdrawn</div>
        </div>
        <div class="summary-stat">
          <div class="val" id="sumTransactions">—</div>
          <div class="lbl">Transactions</div>
        </div>
      </div>

      <!-- ACTIVITY FEED -->
      <div id="activityFeed"></div>

    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="chama.html" class="nav-item">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Chama</span>
    </a>
    <a href="vote.html" class="nav-item">
      <span class="nav-icon">🗳️</span>
      <span class="nav-label">Vote</span>
    </a>
    <a href="activity.html" class="nav-item active">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Activity</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaWp2eXFrb2lla3d5bHhiamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzAxNDUsImV4cCI6MjA5NzMwNjE0NX0.7C7hnKmpIRMnrNU9VJWO-lWp4tu00wF8atxzCNYfi6E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let chamaData   = null;
    let allItems    = [];
    let currentTab  = 'all';

    function kes(n) {
      return 'KES ' + Number(n || 0).toLocaleString('en-KE');
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderFeed();
    }

    function groupByDate(items) {
      const groups = {};
      items.forEach(item => {
        const d = new Date(item.date);
        const key = d.toLocaleDateString('en-KE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });
      return groups;
    }

    function renderFeed() {
      const el = document.getElementById('activityFeed');

      let filtered = allItems;
      if (currentTab === 'contributions') filtered = allItems.filter(i => i.type === 'contribution');
      if (currentTab === 'withdrawals')   filtered = allItems.filter(i => i.type === 'withdrawal');

      if (!filtered.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>No activity yet</h3>
            <p>Contributions and withdrawals will appear here.</p>
          </div>`;
        return;
      }

      const groups = groupByDate(filtered);
      el.innerHTML = Object.entries(groups).map(([date, items]) => `
        <div class="date-group">
          <div class="date-label">${date}</div>
          <div class="activity-list">
            ${items.map(item => {
              if (item.type === 'contribution') {
                return `
                  <div class="activity-row">
                    <div class="activity-icon icon-contrib">💰</div>
                    <div class="activity-info">
                      <div class="activity-title">${item.name} contributed</div>
                      <div class="activity-sub">${item.method || 'M-Pesa'}${item.reference ? ' · ' + item.reference : ''}</div>
                    </div>
                    <div class="activity-amount amount-in">+${kes(item.amount)}</div>
                  </div>`;
              } else {
                return `
                  <div class="activity-row">
                    <div class="activity-icon icon-withdraw">🏦</div>
                    <div class="activity-info">
                      <div class="activity-title">Withdrawal — ${item.status}</div>
                      <div class="activity-sub">${item.reason || 'No reason'}</div>
                    </div>
                    <div class="activity-amount amount-out">-${kes(item.amount)}</div>
                  </div>`;
              }
            }).join('')}
          </div>
        </div>`
      ).join('');
    }

    async function loadPage() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      currentUser = session.user;

      const { data: membership } = await supabase
        .from('chama_members').select('*, chamas(*)')
        .eq('user_id', currentUser.id).limit(1).single();

      if (!membership) { window.location.href = 'dashboard.html'; return; }
      chamaData = membership.chamas;

      // Load contributions
      const { data: contribs } = await supabase
        .from('contributions')
        .select('*, profiles(full_name)')
        .eq('chama_id', chamaData.id)
        .eq('status', 'paid')
        .order('paid_at', { ascending: false });

      // Load withdrawals
      const { data: withdrawals } = await supabase
        .from('withdrawals')
        .select('*')
        .eq('chama_id', chamaData.id)
        .in('status', ['approved', 'rejected'])
        .order('created_at', { ascending: false });

      // Merge into unified list
      const contribItems = (contribs || []).map(c => ({
        type:      'contribution',
        date:      c.paid_at || c.created_at,
        amount:    c.amount,
        name:      c.profiles?.full_name || 'Member',
        method:    c.method,
        reference: c.reference
      }));

      const withdrawItems = (withdrawals || []).map(w => ({
        type:   'withdrawal',
        date:   w.created_at,
        amount: w.amount,
        reason: w.reason,
        status: w.status
      }));

      allItems = [...contribItems, ...withdrawItems]
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      // Summary stats
      const totalIn  = contribItems.reduce((s, c) => s + Number(c.amount), 0);
      const totalOut = withdrawItems.filter(w => w.status === 'approved').reduce((s, w) => s + Number(w.amount), 0);

      document.getElementById('sumTotal').textContent = kes(totalIn);
      document.getElementById('sumWithdrawals').textContent = kes(totalOut);
      document.getElementById('sumTransactions').textContent = allItems.length;

      renderFeed();

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    loadPage();
  </script>

</body>
</html>
