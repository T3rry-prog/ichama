<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#30B54A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="iChama" />
  <title>Vote — iChama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #30B54A; --green-d: #259A3D; --green-tint: #EAF8ED;
      --ink: #1A1F1C; --ink-soft: #5C6760; --bg: #F7F8F7;
      --card: #FFFFFF; --line: #E5E9E6; --error: #D14343; --gold: #D97706;
    }
    /* DARK MODE */
    @media (prefers-color-scheme: dark) {
      :root {
        --green: #30B54A;
        --green-d: #38C45A;
        --green-tint: #0D2E14;
        --ink: #F0F2F0;
        --ink-soft: #8A9E8D;
        --bg: #0F1210;
        --card: #1A1F1C;
        --line: #2A332C;
      }
      body { background: var(--bg); color: var(--ink); }
    }

    /* MANUAL DARK MODE (via data-theme attribute) */
    [data-theme="dark"] {
      --green: #30B54A;
      --green-d: #38C45A;
      --green-tint: #0D2E14;
      --ink: #F0F2F0;
      --ink-soft: #8A9E8D;
      --bg: #0F1210;
      --card: #1A1F1C;
      --line: #2A332C;
    }
    [data-theme="light"] {
      --green: #30B54A;
      --green-d: #259A3D;
      --green-tint: #EAF8ED;
      --ink: #1A1F1C;
      --ink-soft: #5C6760;
      --bg: #F7F8F7;
      --card: #FFFFFF;
      --line: #E5E9E6;
    }
    body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 16px; min-height: 100vh; padding-bottom: 80px; }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
    .back-btn { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--ink); text-decoration: none; font-size: 16px; }
    .topbar h1 { font-weight: 600; font-size: 16px; flex: 1; }
    .new-poll-btn { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    main { padding: 20px 20px 48px; max-width: 480px; margin: 0 auto; }

    /* TABS */
    .tabs { display: flex; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 4px; margin-bottom: 20px; gap: 4px; }
    .tab { flex: 1; text-align: center; padding: 9px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--ink-soft); cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; }
    .tab.active { background: var(--green); color: #fff; font-weight: 600; }

    /* POLL CARD */
    .poll-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .poll-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .poll-title { font-weight: 700; font-size: 16px; color: var(--ink); flex: 1; line-height: 1.4; }
    .poll-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 100px; flex-shrink: 0; margin-left: 10px; }
    .badge-open   { background: var(--green-tint); color: var(--green-d); }
    .badge-closed { background: var(--line); color: var(--ink-soft); }
    .poll-desc { font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 12px; }
    .poll-meta { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }

    /* LIVE */
    .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green-d); font-weight: 600; margin-bottom: 10px; }
    .live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* OPTIONS */
    .options-list { margin-bottom: 12px; }
    .option-row { margin-bottom: 8px; }
    .option-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
    .option-label { font-size: 13.5px; font-weight: 500; color: var(--ink); min-width: 40px; }
    .option-bar-bg { flex: 1; background: var(--line); border-radius: 100px; height: 8px; overflow: hidden; }
    .option-bar-fill { height: 100%; border-radius: 100px; background: var(--green); transition: width 0.4s; }
    .option-bar-fill.mine { background: var(--green-d); }
    .option-count { font-size: 12px; color: var(--ink-soft); min-width: 30px; text-align: right; }
    .option-btn { width: 100%; background: var(--bg); border: 1.5px solid var(--line); border-radius: 9px; padding: 11px 14px; font-size: 14px; font-weight: 500; color: var(--ink); cursor: pointer; font-family: 'Inter', sans-serif; text-align: left; transition: border-color 0.15s, background 0.15s; margin-bottom: 6px; }
    .option-btn:hover { border-color: var(--green); background: var(--green-tint); }
    .option-btn.selected { border-color: var(--green); background: var(--green-tint); color: var(--green-d); font-weight: 600; }

    /* COMMENT */
    .comment-field { margin-bottom: 10px; }
    .comment-field label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; }
    .comment-field textarea { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; resize: none; height: 64px; transition: border-color 0.15s; }
    .comment-field textarea:focus { border-color: var(--green); background: var(--card); }
    .comment-field textarea::placeholder { color: #A7AFA9; }
    .btn-submit-vote { width: 100%; background: var(--green); color: #fff; font-weight: 600; font-size: 14px; padding: 12px; border-radius: 9px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-submit-vote:disabled { opacity: 0.5; cursor: not-allowed; }
    .already-voted-msg { background: var(--green-tint); border-radius: 9px; padding: 10px 14px; font-size: 13px; color: var(--green-d); font-weight: 500; margin-bottom: 10px; }

    /* VOTE FEED */
    .votes-section { border-top: 1px solid var(--line); margin-top: 12px; padding-top: 12px; }
    .votes-title { font-size: 12px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .vote-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
    .vote-item:last-child { border-bottom: none; }
    .vote-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--green-tint); color: var(--green-d); font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .vote-body { flex: 1; }
    .vote-top { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
    .vote-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .vote-choice { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; background: var(--green-tint); color: var(--green-d); }
    .vote-comment { font-size: 12.5px; color: var(--ink-soft); line-height: 1.4; margin-top: 2px; }
    .vote-time { font-size: 11px; color: var(--ink-soft); }

    /* CREATE POLL MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--line); border-radius: 100px; margin: 0 auto 20px; }
    .modal-title { font-weight: 700; font-size: 17px; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13.5px; font-weight: 500; color: var(--ink); margin-bottom: 7px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color 0.15s; appearance: none; }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--green); background: var(--card); }
    .options-editor { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .option-input-row { display: flex; gap: 8px; align-items: center; }
    .option-input-row input { flex: 1; }
    .remove-opt { background: none; border: none; color: var(--error); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
    .add-opt-btn { background: none; border: 1px dashed var(--line); border-radius: 8px; color: var(--green-d); font-size: 13px; font-weight: 600; padding: 9px; cursor: pointer; font-family: 'Inter', sans-serif; width: 100%; }
    .btn-create { width: 100%; background: var(--green); color: #fff; font-weight: 600; font-size: 15px; padding: 14px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 4px; }
    .btn-create:disabled { opacity: 0.55; cursor: not-allowed; }
    .create-error { font-size: 13px; color: var(--error); margin-bottom: 10px; display: none; }
    .create-error.show { display: block; }

    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state h3 { font-weight: 700; font-size: 17px; margin-bottom: 6px; }
    .empty-state p { font-size: 13.5px; color: var(--ink-soft); }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--line); display: flex; justify-content: space-around; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; padding: 5px 14px; }
    .nav-icon { font-size: 19px; }
    .nav-label { font-size: 10px; color: var(--ink-soft); }
    .nav-item.active .nav-label { color: var(--green); font-weight: 600; }
  </style>
  <script>
    (function(){ var t=localStorage.getItem('ichama_theme'); if(t&&t!=='auto') document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <div class="topbar">
    <a href="dashboard.html" class="back-btn">←</a>
    <h1>Polls & Votes</h1>
    <button class="new-poll-btn" id="newPollBtn">+ New poll</button>
  </div>

  <main>
    <div id="loadingState" style="text-align:center;padding:40px;color:#5C6760;">Loading...</div>
    <div id="mainContent" style="display:none">
      <div class="tabs">
        <button class="tab active" data-tab="open">Open</button>
        <button class="tab" data-tab="closed">Closed</button>
      </div>
      <div id="pollList"></div>
    </div>
  </main>

  <!-- CREATE POLL MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Create a poll</div>
      <div class="create-error" id="createError"></div>
      <div class="form-group">
        <label for="pollTitle">Question / Title</label>
        <input type="text" id="pollTitle" placeholder="e.g. Should we invest in land?" />
      </div>
      <div class="form-group">
        <label for="pollDesc">Description <span style="color:var(--ink-soft);font-weight:400;font-size:12px;">(optional)</span></label>
        <textarea id="pollDesc" placeholder="Add more context for members..."></textarea>
      </div>
      <div class="form-group">
        <label>Options</label>
        <div class="options-editor" id="optionsEditor">
          <div class="option-input-row"><input type="text" placeholder="Option 1" value="Yes" /><button class="remove-opt" type="button">×</button></div>
          <div class="option-input-row"><input type="text" placeholder="Option 2" value="No" /><button class="remove-opt" type="button">×</button></div>
        </div>
        <button class="add-opt-btn" id="addOptBtn">+ Add option</button>
      </div>
      <div class="form-group">
        <label for="pollDeadline">Deadline <span style="color:var(--ink-soft);font-weight:400;font-size:12px;">(optional)</span></label>
        <input type="datetime-local" id="pollDeadline" />
      </div>
      <button class="btn-create" id="createPollBtn">Create poll</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="chama.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Chama</span></a>
    <a href="vote.html" class="nav-item active"><span class="nav-icon">🗳️</span><span class="nav-label">Vote</span></a>
    <a href="activity.html" class="nav-item"><span class="nav-icon">📋</span><span class="nav-label">Activity</span></a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  
  <script>
    var SUPABASE_URL      = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaWp2eXFrb2lla3d5bHhiamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzAxNDUsImV4cCI6MjA5NzMwNjE0NX0.7C7hnKmpIRMnrNU9VJWO-lWp4tu00wF8atxzCNYfi6E';

    var currentUser = null;
    var chamaData   = null;
    var allPolls    = [];
    var currentTab  = 'open';
    var pollInterval = null;
    var selectedOptions = {};

    function getToken() { return localStorage.getItem('ichama_token'); }
    function getUser()  { try { return JSON.parse(localStorage.getItem('ichama_user')); } catch(e) { return null; } }
    function authHeaders() { return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }
    function doLogout() { localStorage.removeItem('ichama_token'); localStorage.removeItem('ichama_refresh'); localStorage.removeItem('ichama_user'); window.location.href = 'login.html'; }
    if (!getToken()) { window.location.href = 'login.html'; }

    function timeAgo(d) {
      var diff = Math.floor((Date.now() - new Date(d)) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return new Date(d).toLocaleDateString('en-KE', { day:'numeric', month:'short' });
    }

    async function sbGet(path) {
      var res = await fetch(SUPABASE_URL + path, { headers: authHeaders() });
      if (res.status === 401) { doLogout(); return null; }
      return res.ok ? res.json() : null;
    }

    // ── TABS ──
    document.querySelectorAll('.tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentTab = this.getAttribute('data-tab');
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        renderPolls();
        if (currentTab === 'open') startPolling(); else stopPolling();
      });
    });

    function startPolling() { stopPolling(); pollInterval = setInterval(loadPolls, 10000); }
    function stopPolling() { if (pollInterval) { clearInterval(pollInterval); pollInterval = null; } }
    window.addEventListener('beforeunload', stopPolling);

    // ── MODAL ──
    document.getElementById('newPollBtn').addEventListener('click', function() {
      document.getElementById('modalOverlay').classList.add('show');
    });
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('show');
    });

    // ── OPTIONS EDITOR ──
    document.getElementById('addOptBtn').addEventListener('click', function() {
      var editor = document.getElementById('optionsEditor');
      var count  = editor.children.length + 1;
      var row    = document.createElement('div');
      row.className = 'option-input-row';
      row.innerHTML = '<input type="text" placeholder="Option ' + count + '" /><button class="remove-opt" type="button">×</button>';
      row.querySelector('.remove-opt').addEventListener('click', function() { row.remove(); });
      editor.appendChild(row);
    });

    document.querySelectorAll('.remove-opt').forEach(function(btn) {
      btn.addEventListener('click', function() { this.closest('.option-input-row').remove(); });
    });

    // ── CREATE POLL ──
    document.getElementById('createPollBtn').addEventListener('click', async function() {
      var title    = document.getElementById('pollTitle').value.trim();
      var desc     = document.getElementById('pollDesc').value.trim();
      var deadline = document.getElementById('pollDeadline').value;
      var errEl    = document.getElementById('createError');
      var btn      = this;

      var optInputs = document.querySelectorAll('#optionsEditor input');
      var options = Array.from(optInputs).map(function(i) { return i.value.trim(); }).filter(Boolean);

      if (!title) { errEl.textContent = 'Please enter a question.'; errEl.classList.add('show'); return; }
      if (options.length < 2) { errEl.textContent = 'Add at least 2 options.'; errEl.classList.add('show'); return; }
      errEl.classList.remove('show');

      btn.disabled = true; btn.textContent = 'Creating...';

      try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/polls', {
          method: 'POST',
          headers: Object.assign({}, authHeaders(), { 'Prefer': 'return=representation' }),
          body: JSON.stringify({
            chama_id:   chamaData.id,
            created_by: currentUser.id,
            title:      title,
            description: desc || null,
            options:    JSON.stringify(options),
            deadline:   deadline ? new Date(deadline).toISOString() : null,
            status:     'open'
          })
        });

        if (!res.ok) {
          var err = await res.json();
          errEl.textContent = err.message || 'Failed to create poll.';
          errEl.classList.add('show');
          btn.disabled = false; btn.textContent = 'Create poll'; return;
        }

        document.getElementById('modalOverlay').classList.remove('show');
        document.getElementById('pollTitle').value  = '';
        document.getElementById('pollDesc').value   = '';
        document.getElementById('pollDeadline').value = '';
        btn.disabled = false; btn.textContent = 'Create poll';
        await loadPolls();

      } catch(err) {
        errEl.textContent = 'Network error.';
        errEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Create poll';
      }
    });

    // ── RENDER ──
    function renderPolls() {
      var filtered = allPolls.filter(function(p) { return p.status === currentTab; });
      var el = document.getElementById('pollList');

      if (!filtered.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">🗳️</div><h3>No ' + currentTab + ' polls</h3><p>' + (currentTab === 'open' ? 'Create a poll to get the group\'s opinion on anything.' : 'Closed polls will appear here.') + '</p></div>';
        return;
      }

      el.innerHTML = filtered.map(function(poll) {
        var options  = Array.isArray(poll.options) ? poll.options : JSON.parse(poll.options || '["Yes","No"]');
        var votes    = poll.poll_votes || [];
        var myVote   = votes.find(function(v) { return v.user_id === currentUser.id; });
        var creator  = poll.profiles && poll.profiles.full_name ? poll.profiles.full_name : 'Unknown';
        var isCreator = poll.created_by === currentUser.id;
        var deadline  = poll.deadline ? new Date(poll.deadline).toLocaleDateString('en-KE', { day:'numeric', month:'short', year:'numeric' }) : null;
        var isOpen    = poll.status === 'open';

        // Tally votes
        var tally = options.map(function() { return 0; });
        votes.forEach(function(v) { if (tally[v.option_index] !== undefined) tally[v.option_index]++; });
        var totalVotes = votes.length;

        // Options display
        var optionsHtml = '';
        if (myVote || !isOpen) {
          // Show results
          optionsHtml = '<div class="options-list">' +
            options.map(function(opt, i) {
              var count = tally[i];
              var pct   = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;
              var isMine = myVote && myVote.option_index === i;
              return '<div class="option-row">' +
                '<div class="option-bar-wrap">' +
                  '<span class="option-label">' + opt + '</span>' +
                  '<div class="option-bar-bg"><div class="option-bar-fill' + (isMine ? ' mine' : '') + '" style="width:' + pct + '%"></div></div>' +
                  '<span class="option-count">' + count + ' · ' + pct + '%</span>' +
                '</div>' +
              '</div>';
            }).join('') +
          '</div>';
          if (myVote) {
            optionsHtml = '<div class="already-voted-msg">✓ You voted: ' + options[myVote.option_index] + (myVote.comment ? ' · "' + myVote.comment + '"' : '') + '</div>' + optionsHtml;
          }
        } else {
          // Show vote buttons
          optionsHtml = '<div class="options-list" id="opts_' + poll.id + '">' +
            options.map(function(opt, i) {
              return '<button class="option-btn" data-poll="' + poll.id + '" data-idx="' + i + '">' + opt + '</button>';
            }).join('') +
          '</div>' +
          '<div class="comment-field">' +
            '<label>Add a comment (optional)</label>' +
            '<textarea id="comment_' + poll.id + '" placeholder="Share why you\'re voting this way..."></textarea>' +
          '</div>' +
          '<button class="btn-submit-vote" id="submitVote_' + poll.id + '" data-poll="' + poll.id + '" disabled>Submit vote</button>';
        }

        // Vote feed
        var feedHtml = '';
        if (votes.length > 0) {
          feedHtml = '<div class="votes-section"><div class="votes-title">' + totalVotes + ' vote' + (totalVotes !== 1 ? 's' : '') + '</div>' +
            votes.map(function(v) {
              var vname    = v.profiles && v.profiles.full_name ? v.profiles.full_name : 'Member';
              var initials = vname.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
              var choice   = options[v.option_index] || '?';
              return '<div class="vote-item">' +
                '<div class="vote-avatar">' + initials + '</div>' +
                '<div class="vote-body">' +
                  '<div class="vote-top"><span class="vote-name">' + vname + '</span><span class="vote-choice">' + choice + '</span></div>' +
                  (v.comment ? '<div class="vote-comment">"' + v.comment + '"</div>' : '') +
                  '<div class="vote-time">' + timeAgo(v.created_at) + '</div>' +
                '</div>' +
              '</div>';
            }).join('') +
          '</div>';
        }

        return '<div class="poll-card">' +
          '<div class="poll-header"><div class="poll-title">' + poll.title + '</div><span class="poll-badge ' + (isOpen ? 'badge-open' : 'badge-closed') + '">' + (isOpen ? 'Open' : 'Closed') + '</span></div>' +
          (poll.description ? '<div class="poll-desc">' + poll.description + '</div>' : '') +
          '<div class="poll-meta">By ' + (isCreator ? 'you' : creator) + (deadline ? ' · Closes ' + deadline : '') + '</div>' +
          (isOpen ? '<div class="live-indicator"><div class="live-dot"></div>Live</div>' : '') +
          optionsHtml + feedHtml +
        '</div>';
      }).join('');

      // Attach option button listeners
      document.querySelectorAll('.option-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var pollId = this.getAttribute('data-poll');
          var idx    = parseInt(this.getAttribute('data-idx'));
          selectedOptions[pollId] = idx;
          document.querySelectorAll('[data-poll="' + pollId + '"].option-btn').forEach(function(b) { b.classList.remove('selected'); });
          this.classList.add('selected');
          var submitBtn = document.getElementById('submitVote_' + pollId);
          if (submitBtn) submitBtn.disabled = false;
        });
      });

      // Attach submit listeners
      document.querySelectorAll('[id^="submitVote_"]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var pollId = this.getAttribute('data-poll');
          var idx    = selectedOptions[pollId];
          var comment = document.getElementById('comment_' + pollId) ? document.getElementById('comment_' + pollId).value.trim() : '';
          if (idx === undefined) return;
          submitVote(pollId, idx, comment, this);
        });
      });
    }

    async function submitVote(pollId, optionIndex, comment, btn) {
      btn.disabled = true; btn.textContent = 'Submitting...';
      try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/poll_votes', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            poll_id:      pollId,
            user_id:      currentUser.id,
            chama_id:     chamaData.id,
            option_index: optionIndex,
            comment:      comment || null
          })
        });
        if (!res.ok) {
          var err = await res.json();
          alert(err.message || 'Failed to submit vote.');
          btn.disabled = false; btn.textContent = 'Submit vote'; return;
        }
        await loadPolls();
      } catch(err) {
        alert('Network error.'); btn.disabled = false; btn.textContent = 'Submit vote';
      }
    }

    async function loadPolls() {
      // Fetch polls without nested joins
      var polls = await sbGet('/rest/v1/polls?chama_id=eq.' + chamaData.id + '&select=*&order=created_at.desc') || [];

      if (!polls.length) { allPolls = []; renderPolls(); return; }

      // Fetch creator profiles
      var creatorIds = polls.map(function(p){return p.created_by;}).filter(function(id,i,a){return a.indexOf(id)===i;});
      var creators = creatorIds.length > 0 ? await sbGet('/rest/v1/profiles?id=in.('+creatorIds.join(',')+')'+'&select=id,full_name') || [] : [];
      var creatorMap = {}; creators.forEach(function(p){creatorMap[p.id]=p;});

      // Fetch votes for all polls
      var pollIds = polls.map(function(p){return p.id;});
      var votes = await sbGet('/rest/v1/poll_votes?poll_id=in.('+pollIds.join(',')+')'+'&select=*&order=created_at.desc') || [];

      // Fetch voter profiles
      var voterIds = votes.map(function(v){return v.user_id;}).filter(function(id,i,a){return a.indexOf(id)===i;});
      var voterProfs = voterIds.length > 0 ? await sbGet('/rest/v1/profiles?id=in.('+voterIds.join(',')+')'+'&select=id,full_name') || [] : [];
      var voterMap = {}; voterProfs.forEach(function(p){voterMap[p.id]=p;});

      // Attach profiles and votes to polls
      allPolls = polls.map(function(poll) {
        poll.profiles = creatorMap[poll.created_by] || null;
        poll.poll_votes = votes.filter(function(v){return v.poll_id===poll.id;}).map(function(v){
          v.profiles = voterMap[v.user_id] || null;
          return v;
        });
        return poll;
      });

      renderPolls();
    }

    async function loadPage() {
      try {
        currentUser = getUser();
        if (!currentUser) { doLogout(); return; }

        // Fetch membership and chama separately to avoid nested join issues
        var memberships = await sbGet('/rest/v1/chama_members?user_id=eq.' + currentUser.id + '&select=*&limit=1');
        var membership  = Array.isArray(memberships) && memberships.length > 0 ? memberships[0] : null;
        if (!membership) { window.location.href = 'dashboard.html'; return; }

        var chamas = await sbGet('/rest/v1/chamas?id=eq.' + membership.chama_id + '&select=*&limit=1');
        chamaData = Array.isArray(chamas) && chamas.length > 0 ? chamas[0] : null;
        if (!chamaData) { window.location.href = 'dashboard.html'; return; }

        await loadPolls();
        startPolling();

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display  = 'block';
      } catch(err) {
        document.getElementById('loadingState').textContent = 'Error: ' + (err.message || err);
      }
    }

    loadPage();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(e){console.log('SW error:',e);});
    }
  </script>
</body>
</html>
