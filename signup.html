<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #0DBF72;
      --green-d: #09A05E;
      --dark:    #0A0F0D;
      --card:    #111A15;
      --border:  #1E2E24;
      --muted:   #6B7F73;
      --white:   #F4FBF7;
      --error:   #FF5B5B;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--green); }

    .nav-link {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }

    .nav-link:hover { color: var(--white); }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--muted);
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #A8BFB2;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: #0A0F0D;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: #3d5448; }
    input:focus { border-color: var(--green); }

    .btn-submit {
      width: 100%;
      background: var(--green);
      color: var(--dark);
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 0 24px rgba(13,191,114,0.25);
    }

    .btn-submit:hover { background: var(--green-d); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin: 20px 0;
    }

    .login-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .login-link a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }

    /* MESSAGES */
    .msg {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .msg.error {
      background: rgba(255, 91, 91, 0.1);
      border: 1px solid rgba(255, 91, 91, 0.3);
      color: #FF5B5B;
    }

    .msg.success {
      background: rgba(13, 191, 114, 0.1);
      border: 1px solid rgba(13, 191, 114, 0.3);
      color: var(--green);
    }

    .msg.show { display: block; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    footer span { color: #3d5448; }
    footer strong { color: #6B9E88; font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">i<span>Chama</span></a>
    <a href="login.html" class="nav-link">Already have an account?</a>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <h1>Create your account</h1>
        <p>Join thousands of chamas managing money safely</p>
      </div>

      <div class="msg error" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>

      <div class="form-group">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" placeholder="e.g. Wanjiku Kamau" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" placeholder="e.g. 0712 345 678" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>

      <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create account</button>

      <div class="divider">or</div>

      <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <footer>
    © 2026 iChama · <strong>A product of Bytecast Prime</strong>
  </footer>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TReV1aiW6oT0X4peP7zKQw_1R6gH0XV';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    async function handleSignup() {
      const fullname = document.getElementById('fullname').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('signupBtn');

      // Basic validation
      if (!fullname) return showError('Please enter your full name.');
      if (!phone)    return showError('Please enter your phone number.');
      if (!email)    return showError('Please enter your email address.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        // 1. Create auth account
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullname, phone }
          }
        });

        if (error) {
          showError(error.message);
          btn.disabled = false;
          btn.textContent = 'Create account';
          return;
        }

        // 2. Save profile to profiles table
        if (data.user) {
          await supabase.from('profiles').insert({
            id: data.user.id,
            full_name: fullname,
            phone,
            email
          });
        }

        showSuccess('Account created! Redirecting...');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);

      } catch (err) {
        showError('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSignup();
    });
  </script>

</body>
</html>
