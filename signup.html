<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #0DBF72;
      --dark:  #0A0F0D;
      --card:  #111A15;
      --border:#1E2E24;
      --muted: #6B7F73;
      --white: #F4FBF7;
    }
    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--white);
      text-decoration: none;
    }
    .logo span { color: var(--green); }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #A8BFB2;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input, select {
      width: 100%;
      background: #0A0F0D;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--green); }
    input::placeholder { color: #3d5448; }
    .phone-row { display: flex; gap: 8px; }
    .phone-row select { flex: 0 0 120px; }
    .phone-row input { flex: 1; }
    #msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      word-break: break-word;
    }
    #msg.error {
      background: rgba(255,91,91,0.1);
      border: 1px solid rgba(255,91,91,0.3);
      color: #FF5B5B;
      display: block;
    }
    #msg.success {
      background: rgba(13,191,114,0.1);
      border: 1px solid rgba(13,191,114,0.3);
      color: var(--green);
      display: block;
    }
    #msg.info {
      background: rgba(13,191,114,0.05);
      border: 1px solid rgba(13,191,114,0.15);
      color: #A8BFB2;
      display: block;
    }
    button {
      width: 100%;
      background: var(--green);
      color: #0A0F0D;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
    button:disabled { opacity: 0.6; }
    .footer-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 20px;
    }
    .footer-link a { color: var(--green); text-decoration: none; }
    footer {
      border-top: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    footer strong { color: #6B9E88; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">i<span>Chama</span></a>
  <a href="login.html" style="font-size:14px;color:#6B7F73;text-decoration:none;">Sign in</a>
</nav>

<main>
  <div class="card">
    <h1>Create account</h1>
    <p class="sub">Join thousands of chamas managing money safely</p>

    <label>Full name</label>
    <input type="text" id="fullname" placeholder="e.g. Wanjiku Kamau" />

    <label>Phone number</label>
    <div class="phone-row">
      <select id="code">
        <option value="+254">🇰🇪 +254</option>
        <option value="+255">🇹🇿 +255</option>
        <option value="+256">🇺🇬 +256</option>
        <option value="+250">🇷🇼 +250</option>
        <option value="+251">🇪🇹 +251</option>
        <option value="+233">🇬🇭 +233</option>
        <option value="+234">🇳🇬 +234</option>
        <option value="+27">🇿🇦 +27</option>
        <option value="+44">🇬🇧 +44</option>
        <option value="+1">🇺🇸 +1</option>
      </select>
      <input type="tel" id="phone" placeholder="712 345 678" />
    </div>

    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" />

    <label>Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" />

    <label>Confirm password</label>
    <input type="password" id="confirm" placeholder="Repeat password" />

    <div id="msg"></div>

    <button id="btn" onclick="doSignup()">Create account →</button>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</main>

<footer>© 2026 iChama · <strong>A product of Bytecast Prime</strong></footer>

<script>
  var SUPABASE_URL = 'https://zdijvyqkoiekwylxbjll.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaWp2eXFrb2lla3d5bHhiamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzAxNDUsImV4cCI6MjA5NzMwNjE0NX0.7C7hnKmpIRMnrNU9VJWO-lWp4tu00wF8atxzCNYfi6E';

  function msg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = type;
  }

  async function doSignup() {
    var fullname = document.getElementById('fullname').value.trim();
    var code     = document.getElementById('code').value;
    var phone    = document.getElementById('phone').value.trim();
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var confirm  = document.getElementById('confirm').value;
    var btn      = document.getElementById('btn');

    if (!fullname) return msg('Please enter your full name.', 'error');
    if (!phone)    return msg('Please enter your phone number.', 'error');
    if (!email)    return msg('Please enter your email.', 'error');
    if (password.length < 8) return msg('Password must be at least 8 characters.', 'error');
    if (password !== confirm) return msg('Passwords do not match.', 'error');

    btn.disabled = true;
    btn.textContent = 'Creating account...';
    msg('Connecting to server...', 'info');

    var fullPhone = code + phone.replace(/^0/, '');

    try {
      var res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY
        },
        body: JSON.stringify({ email: email, password: password })
      });

      var data = await res.json();

      if (!res.ok) {
        msg('Error: ' + (data.msg || data.message || data.error_description || JSON.stringify(data)), 'error');
        btn.disabled = false;
        btn.textContent = 'Create account →';
        return;
      }

      if (!data.id) {
        msg('Unexpected response: ' + JSON.stringify(data), 'error');
        btn.disabled = false;
        btn.textContent = 'Create account →';
        return;
      }

      // Save profile
      msg('Saving your profile...', 'info');
      await fetch(SUPABASE_URL + '/rest/v1/profiles', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + data.access_token
        },
        body: JSON.stringify({
          id: data.id,
          full_name: fullname,
          phone: fullPhone,
          email: email
        })
      });

      msg('Account created! Redirecting...', 'success');
      setTimeout(function() {
        window.location.href = 'dashboard.html';
      }, 1500);

    } catch(e) {
      msg('Network error: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Create account →';
    }
  }
</script>

</body>
</html>
