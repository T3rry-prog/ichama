<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #30B54A;
      --green-d:    #259A3D;
      --green-tint: #EAF8ED;
      --ink:        #1A1F1C;
      --ink-soft:   #5C6760;
      --bg:         #F7F8F7;
      --card:       #FFFFFF;
      --line:       #E5E9E6;
      --error:      #D14343;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--green); }

    .nav-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .nav-link:hover { color: var(--ink); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .card-logo {
      font-weight: 700;
      font-size: 24px;
      color: var(--ink);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .card-logo span { color: var(--green); }

    .card-header h1 {
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--ink-soft);
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    input::placeholder { color: #A7AFA9; }
    input:focus { border-color: var(--green); background: var(--card); }

    .btn-submit {
      width: 100%;
      background: var(--green);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      padding: 13px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-submit:hover { background: var(--green-d); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    .divider {
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      margin: 18px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--line);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .login-link {
      text-align: center;
      font-size: 14px;
      color: var(--ink-soft);
    }

    .login-link a { color: var(--green); text-decoration: none; font-weight: 600; }

    .msg {
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .msg.error { background: #FDEDED; border: 1px solid #F5C6C6; color: var(--error); }
    .msg.success { background: var(--green-tint); border: 1px solid rgba(48,181,74,0.3); color: var(--green-d); }
    .msg.show { display: block; }

    .terms {
      font-size: 12px;
      color: var(--ink-soft);
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }

    .terms a { color: var(--green); text-decoration: none; }

    footer {
      border-top: 1px solid var(--line);
      padding: 20px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 12px;
      background: var(--card);
    }

    footer strong { color: var(--ink); font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">i<span>Chama</span></a>
    <a href="login.html" class="nav-link">Already have an account?</a>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <div class="card-logo">i<span>Chama</span></div>
        <h1>Create your account</h1>
        <p>Join thousands of chamas managing money safely</p>
      </div>

      <div class="msg error" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>

      <div class="form-group">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" placeholder="e.g. Wanjiku Kamau" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" placeholder="e.g. 0712 345 678" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>

      <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create account →</button>

      <div class="divider">or</div>

      <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

      <div class="terms">
        By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </div>
    </div>
  </main>

  <footer>
    © 2026 iChama · <strong>A product of Bytecast Prime</strong>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TReV1aiW6oT0X4peP7zKQw_1R6gH0XV';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    async function handleSignup() {
      const fullname = document.getElementById('fullname').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('signupBtn');

      if (!fullname) return showError('Please enter your full name.');
      if (!phone)    return showError('Please enter your phone number.');
      if (!email)    return showError('Please enter your email address.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');

      btn.disabled = true; btn.textContent = 'Creating account...';

      try {
        const { data, error } = await supabase.auth.signUp({
          email, password,
          options: { data: { full_name: fullname, phone } }
        });

        if (error) {
          showError(error.message);
          btn.disabled = false; btn.textContent = 'Create account →'; return;
        }

        if (data.user) {
          await supabase.from('profiles').insert({
            id: data.user.id, full_name: fullname, phone, email
          });
        }

        showSuccess('Account created! Redirecting...');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

      } catch (err) {
        showError('Something went wrong. Please try again.');
        btn.disabled = false; btn.textContent = 'Create account →';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSignup();
    });
  </script>

</body>
</html>
