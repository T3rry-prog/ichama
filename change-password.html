<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change password — iChama</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #30B54A; --green-d: #259A3D; --green-tint: #EAF8ED;
      --ink: #1A1F1C; --ink-soft: #5C6760; --bg: #F7F8F7;
      --card: #FFFFFF; --line: #E5E9E6; --error: #D14343;
    }
    body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 16px; min-height: 100vh; }
    nav { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
    .back-btn { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--ink); text-decoration: none; font-size: 16px; }
    nav h1 { font-weight: 600; font-size: 16px; }
    main { padding: 24px 20px 48px; max-width: 480px; margin: 0 auto; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 13.5px; font-weight: 500; color: var(--ink); margin-bottom: 7px; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 18px; padding: 0; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--green); background: var(--card); }
    .strength-bar { height: 3px; border-radius: 3px; background: var(--line); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 0.3s, background 0.3s; }
    .strength-text { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
    .match-text { font-size: 11px; margin-top: 4px; }
    .match-ok { color: var(--green-d); }
    .match-no { color: var(--error); }
    .msg { border-radius: 9px; padding: 11px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .msg.error { background: #FDEDED; border: 1px solid #F5C6C6; color: var(--error); }
    .msg.success { background: var(--green-tint); border: 1px solid rgba(48,181,74,0.3); color: var(--green-d); }
    .msg.show { display: block; }
    .btn-save { width: 100%; background: var(--green); color: #fff; font-weight: 600; font-size: 15px; padding: 14px; border-radius: 10px; border: none; cursor: pointer; transition: background 0.15s; font-family: 'Inter', sans-serif; }
    .btn-save:hover { background: var(--green-d); }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>

  <nav>
    <a href="profile.html" class="back-btn">←</a>
    <h1>Change password</h1>
  </nav>

  <main>
    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="panel">
      <div class="form-group">
        <label for="newPassword">New password</label>
        <div class="pw-wrap">
          <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" />
          <button class="pw-toggle" type="button" id="toggle1">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm new password</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="Repeat new password" autocomplete="new-password" />
          <button class="pw-toggle" type="button" id="toggle2">👁</button>
        </div>
        <div class="match-text" id="matchText"></div>
      </div>
    </div>

    <button class="btn-save" id="saveBtn">Update password</button>
  </main>

  <script>
    var SUPABASE_URL      = 'https://zdijvyqkoiekwylxbjll.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaWp2eXFrb2lla3d5bHhiamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzAxNDUsImV4cCI6MjA5NzMwNjE0NX0.7C7hnKmpIRMnrNU9VJWO-lWp4tu00wF8atxzCNYfi6E';

    function getToken() { return localStorage.getItem('ichama_token'); }
    function doLogout() {
      localStorage.removeItem('ichama_token'); localStorage.removeItem('ichama_refresh'); localStorage.removeItem('ichama_user');
      window.location.href = 'login.html';
    }
    if (!getToken()) { window.location.href = 'login.html'; }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }
    function showSuccess(msg) {
      var el = document.getElementById('successMsg');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    // ── PASSWORD TOGGLES ──
    document.getElementById('toggle1').addEventListener('click', function() {
      var input = document.getElementById('newPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });
    document.getElementById('toggle2').addEventListener('click', function() {
      var input = document.getElementById('confirmPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });

    // ── STRENGTH ──
    document.getElementById('newPassword').addEventListener('input', function() {
      var pw   = this.value;
      var fill = document.getElementById('strengthFill');
      var text = document.getElementById('strengthText');
      var score = 0;
      if (pw.length >= 8)          score++;
      if (/[A-Z]/.test(pw))        score++;
      if (/[0-9]/.test(pw))        score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      var levels = [
        { w: '0%',   color: '',        label: '' },
        { w: '25%',  color: '#D14343', label: 'Weak' },
        { w: '50%',  color: '#D97706', label: 'Fair' },
        { w: '75%',  color: '#3B82F6', label: 'Good' },
        { w: '100%', color: '#30B54A', label: 'Strong' }
      ];
      fill.style.width      = levels[score].w;
      fill.style.background = levels[score].color;
      text.textContent      = levels[score].label;
      text.style.color      = levels[score].color;
      checkMatch();
    });

    // ── MATCH ──
    document.getElementById('confirmPassword').addEventListener('input', checkMatch);
    function checkMatch() {
      var pw  = document.getElementById('newPassword').value;
      var pw2 = document.getElementById('confirmPassword').value;
      var el  = document.getElementById('matchText');
      if (!pw2) { el.textContent = ''; return; }
      if (pw === pw2) {
        el.textContent = '✓ Passwords match';
        el.className = 'match-text match-ok';
      } else {
        el.textContent = '✗ Passwords do not match';
        el.className = 'match-text match-no';
      }
    }

    // ── SUBMIT ──
    document.getElementById('saveBtn').addEventListener('click', async function() {
      var pw  = document.getElementById('newPassword').value;
      var pw2 = document.getElementById('confirmPassword').value;
      var btn = this;

      if (pw.length < 8)  return showError('Password must be at least 8 characters.');
      if (pw !== pw2)     return showError('Passwords do not match.');

      btn.disabled = true; btn.textContent = 'Updating...';

      try {
        // Supabase REST password update via /auth/v1/user with PUT
        var res = await fetch(SUPABASE_URL + '/auth/v1/user', {
          method: 'PUT',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + getToken(),
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password: pw })
        });

        if (!res.ok) {
          var err = await res.json();
          if (res.status === 401) { doLogout(); return; }
          showError(err.msg || err.message || 'Failed to update password.');
          btn.disabled = false; btn.textContent = 'Update password'; return;
        }

        showSuccess('Password updated successfully.');
        btn.textContent = 'Updated ✓';
        setTimeout(function() { window.location.href = 'profile.html'; }, 1500);

      } catch(err) {
        showError('Network error. Please try again.');
        btn.disabled = false; btn.textContent = 'Update password';
      }
    });
  </script>

</body>
</html>
